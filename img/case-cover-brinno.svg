<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brinno camera management case study cover">
  <!-- Orange background -->
  <rect width="800" height="600" fill="#DC5A1F"/>

  <!-- Subtle dot grid texture for depth -->
  <defs>
    <pattern id="dots-brinno" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#F5F2EC" fill-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#dots-brinno)"/>

  <!-- Top-left: project number + category label -->
  <text x="48" y="62"
        font-family="'JetBrains Mono', ui-monospace, 'Courier New', monospace"
        font-size="13" font-weight="500"
        fill="#F5F2EC" letter-spacing="2.4">01 — CAMERA MANAGEMENT</text>

  <!-- Top-right: camera viewfinder mockup -->
  <g transform="translate(620, 44)">
    <!-- Outer viewfinder frame -->
    <rect width="148" height="92" rx="4" fill="none" stroke="#F5F2EC" stroke-width="1.5"/>
    <!-- Viewfinder corner brackets -->
    <path d="M 10 20 L 10 10 L 20 10" stroke="#F5F2EC" stroke-width="2.5" fill="none" stroke-linecap="square"/>
    <path d="M 128 10 L 138 10 L 138 20" stroke="#F5F2EC" stroke-width="2.5" fill="none" stroke-linecap="square"/>
    <path d="M 10 72 L 10 82 L 20 82" stroke="#F5F2EC" stroke-width="2.5" fill="none" stroke-linecap="square"/>
    <path d="M 138 72 L 138 82 L 128 82" stroke="#F5F2EC" stroke-width="2.5" fill="none" stroke-linecap="square"/>
    <!-- REC indicator -->
    <circle cx="22" cy="34" r="4.5" fill="#F5F2EC"/>
    <text x="34" y="38"
          font-family="'JetBrains Mono', monospace"
          font-size="11" font-weight="500"
          fill="#F5F2EC" letter-spacing="2">REC</text>
    <!-- Timecode -->
    <text x="138" y="78" text-anchor="end"
          font-family="'JetBrains Mono', monospace"
          font-size="10" font-weight="500"
          fill="#F5F2EC" fill-opacity="0.7" letter-spacing="1.5">14:32:08</text>
  </g>

  <!-- Big italic editorial word — the visual anchor -->
  <text x="44" y="450"
        font-family="'Fraunces', 'Times New Roman', Georgia, serif"
        font-style="italic" font-size="280" font-weight="400"
        fill="#F5F2EC" letter-spacing="-12">see.</text>

  <!-- Bottom-left: kicker tag -->
  <text x="48" y="552"
        font-family="'JetBrains Mono', monospace"
        font-size="12" font-weight="500"
        fill="#F5F2EC" fill-opacity="0.78" letter-spacing="2">CONSTRUCTION SITES, FROM CHAOS TO CLARITY</text>

  <!-- Bottom-right: credit -->
  <text x="752" y="552" text-anchor="end"
        font-family="'JetBrains Mono', monospace"
        font-size="12" font-weight="500"
        fill="#F5F2EC" fill-opacity="0.78" letter-spacing="2">BRINNO × NTU · 2022—2023</text>

  <!-- Subtle black 1px outer stroke to match the site's edge language -->
  <rect x="0.5" y="0.5" width="799" height="599" fill="none" stroke="#0A0A0A" stroke-width="1"/>
</svg>
